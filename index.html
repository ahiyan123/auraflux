<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURAFLUX | Sovereign Engine</title>
    <style>
        /* --- AURAFLUX MINIMALIST FRAMEWORK --- */
        :root {
            --bg: #ffffff;
            --border: #eeeeee;
            --text-main: #1a1a1a;
            --text-muted: #888888;
            --accent: #000000;
            --status-green: #00ca4e;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 15px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .status-indicator { color: var(--status-green); font-size: 10px; }

        /* --- SWARM GRID --- */
        .container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr 1.5fr;
            background-color: var(--border);
            gap: 1px; 
        }

        .pane {
            background-color: var(--bg);
            padding: 35px;
            overflow-y: auto;
        }

        label {
            font-size: 10px;
            font-weight: 800;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .output {
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .consensus-box {
            font-size: 16px;
            font-weight: 500;
            line-height: 1.8;
            border-left: 3px solid var(--accent);
            padding-left: 25px;
        }

        /* --- INPUT CONSOLE --- */
        footer {
            padding: 25px 40px;
            border-top: 1px solid var(--border);
            display: flex;
            background: var(--bg);
            gap: 20px;
        }

        input[type="text"] {
            flex: 1;
            border: none;
            font-size: 16px;
            outline: none;
            background: transparent;
        }

        button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        button:active { opacity: 0.7; }
    </style>
</head>

        <span>AURAFLUX // SOVEREIGN ENGINE</span>
        <span class="status-indicator" id="status">● SYSTEM ONLINE</span>
    </header>

        </div>

        <div class="pane">
            <label>Audit Specialist (GPT-OSS)</label>
            <div id="a" class="output">_awaiting_parameters</div>
        </div>

            <label
