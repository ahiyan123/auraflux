<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>AURAFLUX</title>
    <style>
        :root { --bg: #fff; --border: #eee; --text: #1a1a1a; --muted: #888; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        nav { padding: 20px 40px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 800; letter-spacing: 2px; }
        
        /* The container height fix */
        .container { 
            flex: 1; 
            display: grid; 
            grid-template-columns: 1fr 1fr 1.5fr; 
            background: var(--border); 
            gap: 1px;
            height: calc(100vh - 140px); 
        }
        
        .pane { background: #fff; padding: 30px; overflow-y: auto; }
        label { font-size: 9px; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 15px; }
        .output { font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
        .consensus { font-size: 16px; border-left: 3px solid #000; padding-left: 20px; font-weight: 500; }
        
        footer { 
            height: 80px; 
            padding: 0 40px; 
            border-top: 1px solid var(--border); 
            display: flex; 
            align-items: center; 
            background: #fff; 
        }
        input { flex: 1; border: none; outline: none; font-size: 16px; background: transparent; }
        button { background: #000; color: #fff; border: none; padding: 10px 25px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <nav>AURAFLUX // SYSTEM ONLINE</nav>
    <div class="container">
        <div class="pane"><label>Logic (Qwen)</label><div id="l" class="output">...</div></div>
        <div class="pane"><label>Audit (GPT-OSS)</label><div id="a" class="output">...</div></div>
        <div class="pane"><label>Gemma 4 Consensus</label><div id="f" class="consensus">Ready...</div></div>
    </div>
    <footer>
        <input type="text" id="i" placeholder="Enter parameter..." onkeypress="if(event.key==='Enter') run()">
        <button onclick="run()">EXECUTE</button>
    </footer>
    <script>
        async function run() {
            const i = document.getElementById('i');
            const val = i.value; if(!val) return;
            i.value = '';
            document.getElementById('f').innerText = "Fluxing...";
            const res = await fetch('/api/auraflux', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({prompt: val})
            });
            const d = await res.json();
            document.getElementById('l').innerText = d.logic;
            document.getElementById('a').innerText = d.audit;
            document.getElementById('f').innerText = d.final;
        }
    </script>
</body>
</html>
